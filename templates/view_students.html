<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
</head>
<body>

<h1>Student Records</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Marks</th>
    <th>Actions</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>

    <td>
    <a href="/edit/{{ student[0] }}">
        Edit
    </a>

    |

    <a href="/delete/{{ student[0] }}">
        Delete
    </a>
</td>
</tr>

{% endfor %}

</table>

</body>
</html>
